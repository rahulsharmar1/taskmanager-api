# render.yaml — defines the full infrastructure for this project.
# Render reads this file and provisions the web service + database automatically.

services:
  - type: web
    name: taskmanager-api
    env: python
    region: oregon            # free tier region
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
      - key: ALLOWED_HOSTS
        value: taskmanager-api.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://taskmanager-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString

databases:
  - name: taskmanager-db
    plan: free
    region: oregon